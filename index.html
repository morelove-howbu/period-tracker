<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>生理期觀測追蹤表</title>
    
    <!-- PWA 與手機桌面化設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Red Power">
    <meta name="theme-color" content="#fffafb">

    <!-- App 圖示：在愛心下方融入了 Red Power 字樣 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23ff8a98%22/><path d=%22M50 72s-22-13-22-26c0-7 6-13 11-13 4 0 7 2 11 6 4-4 7-6 11-6 5 0 11 6 11 13 0 13-22 26-22 26z%22 fill=%22white%22/><text x=%2250%22 y=%2288%22 font-family=%22sans-serif%22 font-size=%2210%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>Red Power</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23ff8a98%22/><path d=%22M50 72s-22-13-22-26c0-7 6-13 11-13 4 0 7 2 11 6 4-4 7-6 11-6 5 0 11 6 11 13 0 13-22 26-22 26z%22 fill=%22white%22/><text x=%2250%22 y=%2288%22 font-family=%22sans-serif%22 font-size=%2210%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>Red Power</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@600&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fffafb;
            padding-top: env(safe-area-inset-top);
        }

        .brand-font {
            font-family: 'Quicksand', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff8a98 0%, #ffc1cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .soft-shadow {
            box-shadow: 0 10px 25px -5px rgba(255, 138, 152, 0.1), 0 8px 10px -6px rgba(255, 138, 152, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-[#4a4a4a]">

    <div class="max-w-2xl w-full text-center">
        <!-- 標題與品牌區域 -->
        <header class="mb-10">
            <div class="inline-flex flex-col items-center">
                <!-- 核心圖示容器 -->
                <div class="p-5 bg-white rounded-3xl mb-3 soft-shadow border border-pink-50">
                    <svg class="w-12 h-12 text-[#ff8a98]" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <!-- 品牌名稱 -->
                <span class="brand-font text-[#ff8a98] font-bold tracking-widest text-sm uppercase mb-4">Red Power</span>
            </div>
            
            <h1 class="text-4xl md:text-5xl font-bold gradient-text mb-4">
                生理期觀測追蹤表
            </h1>
            <p class="text-gray-400 text-lg font-light tracking-wide px-4">
                讀懂身體的悄悄話，記錄屬於妳的溫柔節奏。
            </p>
        </header>

        <!-- 內容容器 -->
        <div class="bg-white/60 backdrop-blur-sm rounded-[2rem] p-10 soft-shadow border border-pink-50 min-h-[250px] flex flex-col items-center justify-center relative overflow-hidden">
            <!-- 裝飾用的淡粉色圓圈 -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-pink-50 rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
            
            <p class="text-pink-400 font-medium mb-3 relative z-10">嗨！這是專屬於妳的 Red Power</p>
            <p class="text-gray-400 text-sm italic leading-relaxed relative z-10">
                點擊下方分享按鈕並「加入主畫面」<br>
                讓妳製作的專屬工具常駐在桌面上。
            </p>
        </div>
        
        <footer class="mt-8">
            <p class="text-gray-300 text-xs font-light tracking-widest uppercase">Created by Red Power</p>
        </footer>
    </div>

</body>
</html>
